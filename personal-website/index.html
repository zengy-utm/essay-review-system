<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">个人主页</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#skills">技能</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>欢迎来到我的个人主页</h1>
            <p>我是一名开发者，热爱编程和创新</p>
            <button class="cta-btn">了解更多</button>
        </div>
    </section>

    <!-- 关于section -->
    <section id="about" class="about">
        <div class="container">
            <h2>关于我</h2>
            <p>我是一名全栈开发者，拥有多年的web开发经验。热情于学习新技术，致力于创建用户友好的应用程序。</p>
        </div>
    </section>

    <!-- 技能section -->
    <section id="skills" class="skills">
        <div class="container">
            <h2>技能</h2>
            <div class="skills-grid">
                <div class="skill-card">
                    <h3>前端开发</h3>
                    <p>HTML, CSS, JavaScript, React</p>
                </div>
                <div class="skill-card">
                    <h3>后端开发</h3>
                    <p>Node.js, Python, SQL</p>
                </div>
                <div class="skill-card">
                    <h3>数据库</h3>
                    <p>MySQL, MongoDB, PostgreSQL</p>
                </div>
                <div class="skill-card">
                    <h3>其他</h3>
                    <p>Git, Docker, AWS</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系section -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系我</h2>
            <form class="contact-form">
                <input type="text" placeholder="你的名字" required>
                <input type="email" placeholder="你的邮箱" required>
                <textarea placeholder="你的信息" rows="5" required></textarea>
                <button type="submit" class="submit-btn">发送</button>
            </form>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 个人主页. 版权所有。</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
